<!DOCTYPE html>
<html lang="zh-CN" data-theme="classic">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>是谁在撒谎？— 侦探推理游戏</title>
<style>
  /* ============================================================
     经典侦探 (默认 · 中性)
     ============================================================ */
  :root, [data-theme="classic"] {
    --bg: #0d1117; --surface: #161b22; --card: #1c2333;
    --btn: #212b3e; --btn-hover: #2a3855;
    --accent: #c9a96e; --accent-dim: #8b7355;
    --red: #c0392b; --green: #27ae60; --yellow: #f0c040;
    --text: #e6e6e6; --text2: #9ca3af; --border: #2a3344;
    --glow: radial-gradient(ellipse at 50% 0%, #1a2235 0%, var(--bg) 70%);
  }
  /* ============================================================
     暗夜追踪 (冷色 · 偏男)
     ============================================================ */
  [data-theme="night"] {
    --bg: #0a0e17; --surface: #111827; --card: #151d2e;
    --btn: #1a2540; --btn-hover: #243356;
    --accent: #4da6ff; --accent-dim: #3b6fa0;
    --red: #e74c3c; --green: #2ecc71; --yellow: #f39c12;
    --text: #e8ecf1; --text2: #8899aa; --border: #1e3a5f;
    --glow: radial-gradient(ellipse at 50% 0%, #0f1a2e 0%, var(--bg) 70%);
  }
  /* ============================================================
     蔷薇推理 (暖色 · 偏女)
     ============================================================ */
  [data-theme="rose"] {
    --bg: #1a1124; --surface: #1f1830; --card: #261d38;
    --btn: #2d2240; --btn-hover: #3d2e56;
    --accent: #e8739e; --accent-dim: #9e5a7a;
    --red: #e74c6f; --green: #2ecc71; --yellow: #f0c040;
    --text: #ede6f0; --text2: #b8a8c4; --border: #3d2a4a;
    --glow: radial-gradient(ellipse at 50% 0%, #1f1630 0%, var(--bg) 70%);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", "Helvetica Neue", sans-serif;
    background: var(--bg); color: var(--text);
    -webkit-tap-highlight-color: transparent; user-select: none;
  }
  body {
    display: flex; justify-content: center; align-items: center;
    padding: 16px; background: var(--glow);
  }
  .container { width: 100%; max-width: 620px; display: flex; flex-direction: column; gap: 16px; }

  /* 徽章 */
  .badge { display: flex; align-items: center; justify-content: center; gap: 10px; color: var(--accent-dim); font-size: 0.82rem; letter-spacing: 3px; text-transform: uppercase; padding-top: 8px; }
  .badge::before, .badge::after { content: ""; display: block; width: 20px; height: 1px; background: var(--accent-dim); }

  /* 标题 */
  .title-block { text-align: center; padding: 24px 0 4px; }
  .title-block .icon { font-size: 2.6rem; margin-bottom: 4px; }
  .title-block h1 { font-size: 2.2rem; color: var(--accent); margin-bottom: 4px; letter-spacing: 3px; }
  .title-block .subtitle { color: var(--text2); font-size: 0.82rem; letter-spacing: 1px; }

  /* 故事框 */
  .story-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; color: var(--text2); font-size: 0.85rem; line-height: 1.7; text-align: center; }
  .story-box em { color: var(--accent); font-style: normal; }

  /* 主题选择 */
  .theme-row { display: flex; gap: 8px; justify-content: center; }
  .theme-dot { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s, transform 0.15s; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
  .theme-dot:active { transform: scale(0.92); }
  .theme-dot.classic { background: #c9a96e; }
  .theme-dot.night   { background: #4da6ff; }
  .theme-dot.rose    { background: #e8739e; }
  .theme-dot.active  { border-color: #fff; box-shadow: 0 0 8px currentColor; }
  .theme-label { font-size: 0.72rem; color: var(--text2); text-align: center; }

  /* 模式选择 */
  .mode-row { display: flex; gap: 10px; }
  .mode-card { flex: 1; text-align: center; padding: 16px 10px; background: var(--card); border: 2px solid var(--border); border-radius: 12px; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
  .mode-card.active { border-color: var(--accent); background: color-mix(in srgb, var(--card) 80%, var(--accent)); }
  .mode-card .mode-icon { font-size: 1.5rem; margin-bottom: 2px; }
  .mode-card .mode-name { font-weight: bold; font-size: 0.95rem; }
  .mode-card .mode-desc { font-size: 0.75rem; color: var(--text2); margin-top: 4px; line-height: 1.4; }

  /* 顶部栏 */
  .topbar { display: flex; justify-content: space-between; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 11px 16px; font-size: 0.88rem; }
  .topbar .level { font-weight: bold; }
  .topbar .score { color: var(--accent); font-weight: bold; }
  .topbar .phase { color: var(--text2); font-size: 0.8rem; }
  .mode-badge { font-size: 0.7rem; padding: 2px 7px; border-radius: 4px; font-weight: bold; letter-spacing: 1px; }
  .mode-badge.normal { background: #1a3a2a; color: var(--green); }
  .mode-badge.challenge { background: #3a1a1a; color: var(--red); }

  /* 选项 */
  .card-area { display: flex; flex-direction: column; gap: 9px; }
  .option-btn { display: flex; align-items: center; gap: 12px; background: var(--btn); border: 1px solid var(--border); border-radius: 10px; padding: 15px 16px; cursor: pointer; text-align: left; font-size: 0.95rem; color: var(--text); line-height: 1.5; transition: border-color 0.15s, background 0.15s, transform 0.1s; }
  .option-btn:active { transform: scale(0.985); }
  .option-btn .label { flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; background: var(--accent-dim); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.82rem; }
  .option-btn.correct { background: #0d2b1e; border-color: var(--green); }
  .option-btn.correct .label { background: var(--green); }
  .option-btn.wrong   { background: #2b0d0d; border-color: var(--red); }
  .option-btn.wrong .label { background: var(--red); }
  .option-btn:not(.correct):not(.wrong):hover { background: var(--btn-hover); border-color: var(--accent-dim); }
  @media (hover: none) {
    .option-btn:not(.correct):not(.wrong):hover { background: var(--btn); border-color: var(--border); }
    .option-btn:not(.correct):not(.wrong):active { background: var(--btn-hover); border-color: var(--accent-dim); }
  }

  /* 计时器 */
  .timer-section { display: flex; flex-direction: column; gap: 5px; }
  .timer-header { display: flex; justify-content: space-between; align-items: baseline; }
  .timer-text { font-size: 1rem; font-weight: bold; }
  .timer-type { font-size: 0.75rem; color: var(--text2); }
  .timer-bar-wrap { height: 7px; background: var(--surface); border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
  .timer-bar-fill { height: 100%; border-radius: 4px; transition: width 0.05s linear; }

  /* 按钮 */
  .main-btn { display: block; width: 100%; padding: 14px 0; border: none; border-radius: 10px; font-size: 1.05rem; font-weight: bold; cursor: pointer; transition: opacity 0.15s; letter-spacing: 1px; }
  .main-btn:active { opacity: 0.85; }
  .btn-accent { background: var(--accent); color: #1a1a1a; }
  .btn-dark { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-red  { background: var(--red); color: #fff; }

  /* 结算 */
  .over-block { text-align: center; padding: 16px 0; }
  .over-block h2 { font-size: 1.9rem; color: var(--red); margin-bottom: 2px; }
  .over-block .reason { color: var(--text2); font-size: 0.95rem; margin-bottom: 18px; }
  .over-block .final-score { font-size: 3.5rem; font-weight: bold; color: var(--accent); line-height: 1; }
  .over-block .final-label { color: var(--text2); font-size: 0.82rem; margin: 2px 0 6px; }
  .over-block .detail { color: var(--text2); font-size: 0.82rem; margin-bottom: 24px; }
  .btn-group { display: flex; flex-direction: column; gap: 9px; }

  @media (max-width: 480px) {
    .title-block h1 { font-size: 1.6rem; }
    .title-block .icon { font-size: 2rem; }
    .title-block { padding: 10px 0 2px; }
    .option-btn { padding: 12px 12px; font-size: 0.88rem; gap: 8px; }
    .option-btn .label { width: 24px; height: 24px; font-size: 0.75rem; }
    .over-block .final-score { font-size: 2.8rem; }
    .story-box { font-size: 0.8rem; padding: 10px 12px; }
  }
</style>
</head>

function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function randInt(min,max){return Math.floor(Math.random()*(max-min+1))+min;}

// ============================================================
//  逻辑题生成器 (3人6套模板 + 4人4套模板)
// ============================================================
function generateLogicQuestion() {
  const people=["A","B","C"];
  const liar=people[randInt(0,2)];
  const truth=people.filter(p=>p!==liar);
  const[t1,t2]=truth;
  const tid=randInt(0,5);
  let items;

  if(tid===0){
    items=[{text:`${liar}说：${t1}在说谎`,truth:false},{text:`${t1}说：${t2}在说真话`,truth:true},{text:`${t2}说：${liar}在说谎`,truth:true}];
  }else if(tid===1){
    items=[{text:`${liar}说：${t1}在说谎`,truth:false},{text:`${t1}说：我在说真话`,truth:true},{text:`${t2}说：${t1}在说真话`,truth:true}];
  }else if(tid===2){
    const facts=["1+1=2","地球绕太阳运行","水往低处流","一年有十二个月"];
    items=[{text:`${liar}说：${t1}在说谎`,truth:false},{text:`${t1}说：${facts[randInt(0,3)]}`,truth:true},{text:`${t2}说：${t1}在说真话`,truth:true}];
  }else if(tid===3){
    items=[{text:`${liar}说：我在说真话`,truth:false},{text:`${t1}说：${t2}在说真话`,truth:true},{text:`${t2}说：${liar}在说谎`,truth:true}];
  }else if(tid===4){
    items=[{text:`${liar}说：${t1}和${t2}都在说谎`,truth:false},{text:`${t1}说：${liar}在说谎`,truth:true},{text:`${t2}说：${t1}在说真话`,truth:true}];
  }else{
    const facts=["指纹是破案的重要线索","监控可以记录犯罪过程","说谎者在陈述时可能露出破绽","不在场证明是嫌疑人自证清白的方式"];
    items=[{text:`${liar}说："${facts[randInt(0,3)]}"这句话是错的`,truth:false},{text:`${t1}说：${liar}在说谎`,truth:true},{text:`${t2}说：${t1}在说真话`,truth:true}];
  }
  items=shuffle(items);
  return{statements:items.map(it=>it.text),falseIdx:items.findIndex(it=>!it.truth)};
}

function generateHardLogicQuestion() {
  const people=["A","B","C","D"];
  const liar=people[randInt(0,3)];
  const truth=people.filter(p=>p!==liar);
  const[t0,t1,t2]=truth;
  const tid=randInt(0,3);
  let items;

  if(tid===0){
    items=[{text:`${liar}说：${t0}在说谎`,truth:false},{text:`${t0}说：${t1}在说真话`,truth:true},{text:`${t1}说：${t2}在说真话`,truth:true},{text:`${t2}说：${liar}在说谎`,truth:true}];
  }else if(tid===1){
    items=[{text:`${liar}说：我在说真话`,truth:false},{text:`${t0}说：${liar}在说谎`,truth:true},{text:`${t1}说：${t0}在说真话`,truth:true},{text:`${t2}说：${t1}在说真话`,truth:true}];
  }else if(tid===2){
    const facts=["1+1=2","地球绕太阳运行","一年有十二个月","三角形内角和为180度"];
    items=[{text:`${liar}说：${t0}在说谎`,truth:false},{text:`${t0}说：${t1}在说真话`,truth:true},{text:`${t1}说：我想的和${t0}一样`,truth:true},{text:`${t2}说：${facts[randInt(0,3)]}`,truth:true}];
  }else{
    items=[{text:`${liar}说：${t0}和${t1}都在说谎`,truth:false},{text:`${t0}说：${t1}在说真话`,truth:true},{text:`${t1}说：${t2}在说真话`,truth:true},{text:`${t2}说：${liar}在说谎`,truth:true}];
  }
  items=shuffle(items);
  return{statements:items.map(it=>it.text),falseIdx:items.findIndex(it=>!it.truth)};
}

// ============================================================
//  引擎
// ============================================================
const TIME={
  normal:{common:8,logic3:10,logic4:12},
  challenge:{common:5,logic3:5,logic4:4}
};

class GameEngine {
  constructor(){this.reset();}
  reset(mode){this.mode=mode||"normal";this.level=0;this.score=0;this.used=[];}
  nextQuestion(){
    let statements,falseIdx,timeLimit,numOpts,qType;
    const tm=TIME[this.mode];
    if(this.level<5){
      qType="common";const r=this._pickCommon();statements=r.statements;falseIdx=r.falseIdx;timeLimit=tm.common;numOpts=3;
    }else if(this.level<10){
      qType="logic3";const q=generateLogicQuestion();statements=q.statements;falseIdx=q.falseIdx;timeLimit=tm.logic3;numOpts=3;
    }else{
      if(Math.random()<0.4){qType="common";const r=this._pickCommon();statements=r.statements;falseIdx=r.falseIdx;timeLimit=tm.common;numOpts=3;}
      else{qType="logic4";const q=generateHardLogicQuestion();statements=q.statements;falseIdx=q.falseIdx;timeLimit=tm.logic4;numOpts=4;}
    }
    this._current={statements,falseIdx,timeLimit,numOpts,qType};
    return this._current;
  }
  _pickCommon(){
    let avail=COMMON_SENSE.map((_,i)=>i).filter(i=>!this.used.includes(i));
    if(avail.length===0){this.used=[];avail=COMMON_SENSE.map((_,i)=>i);}
    const idx=avail[randInt(0,avail.length-1)];this.used.push(idx);
    const q=COMMON_SENSE[idx];
    const items=q.slice(0,3).map((text,i)=>({text,orig:i}));
    const shuffled=shuffle(items);
    return{statements:shuffled.map(it=>it.text),falseIdx:shuffled.findIndex(it=>it.orig===q[3])};
  }
  answer(index){
    if(!this._current)return{correct:false,score:this.score};
    const correct=index===this._current.falseIdx;
    if(correct){this.level++;this.score+=10;}
    const info={correct,score:this.score,falseIdx:this._current.falseIdx,qType:this._current.qType};
    this._current=null;return info;
  }
  timeout(){
    if(!this._current)return{score:this.score};
    const info={score:this.score,falseIdx:this._current.falseIdx,qType:this._current.qType};
    this._current=null;return info;
  }
  get phase(){if(this.level<5)return"初步调查";if(this.level<10)return"深入审讯";return"核心案件";}
  get phaseDesc(){if(this.level<5)return"常识判断";if(this.level<10)return"逻辑推理";return"高难挑战";}
}

// ============================================================
//  UI
// ============================================================
const app=document.getElementById("app");
const engine=new GameEngine();
const LABELS=["A","B","C","D"];
let timerInterval=null,timeLeft=0,timeLimit=10,locked=false,selectedMode="normal";

function render(html){app.innerHTML=html;}
function qTypeLabel(t){if(t==="common")return"常识判断";if(t==="logic3")return"三人逻辑";if(t==="logic4")return"四人推理";return"";}

// ---- 主题 ----
const THEMES=["classic","night","rose"];
const THEME_NAMES={classic:"经典侦探",night:"暗夜追踪",rose:"蔷薇推理"};
const THEME_ICONS={classic:"🔍",night:"🌙",rose:"🌹"};

function getTheme(){return document.documentElement.getAttribute("data-theme")||"classic";}
function setTheme(t){
  document.documentElement.setAttribute("data-theme",t);
  try{localStorage.setItem("whoslying-theme",t);}catch(e){}
}

// ---- 首页 ----
function showStart(){
  const cur=getTheme();
  const themeDots=THEMES.map(t=>`<div class="theme-dot ${t}${t===cur?' active':''}" onclick="setTheme('${t}');showStart();" title="${THEME_NAMES[t]}">${THEME_ICONS[t]}</div>`).join("");
  const nSel=selectedMode==="normal"?"active":"",cSel=selectedMode==="challenge"?"active":"";
  const nTimes=`常识 ${TIME.normal.common}s · 推理 ${TIME.normal.logic3}s · 高难 ${TIME.normal.logic4}s`;
  const cTimes=`常识 ${TIME.challenge.common}s · 推理 ${TIME.challenge.logic3}s · 高难 ${TIME.challenge.logic4}s`;

  render(`
    <div class="badge">案件编号 #2026</div>
    <div class="title-block">
      <div class="icon">&#128373;</div>
      <h1>是谁在撒谎？</h1>
      <p class="subtitle">DETECTIVE INTERROGATION</p>
    </div>

    <div class="story-box">
      城市中接连发生离奇案件。作为<em>特别调查组</em>的侦探，<br>
      你需要审讯每一位目击者 —— 他们的陈述中，<em>恰好有一句是谎言</em>。<br>
      找出说谎者，揭开案件真相。
    </div>

    <div style="text-align:center;">
      <div class="theme-label">界面风格</div>
      <div class="theme-row">${themeDots}</div>
    </div>

    <div style="color:var(--text2);font-size:0.82rem;text-align:center;">选择调查模式</div>
    <div class="mode-row">
      <div class="mode-card ${nSel}" onclick="selectMode('normal')" id="modeNormal">
        <div class="mode-icon">&#128269;</div><div class="mode-name">普通模式</div>
        <div class="mode-desc">时间充裕，轻松推理<br>${nTimes}</div>
      </div>
      <div class="mode-card ${cSel}" onclick="selectMode('challenge')" id="modeChallenge">
        <div class="mode-icon">&#9889;</div><div class="mode-name">挑战模式</div>
        <div class="mode-desc">时间紧迫，极限反应<br>${cTimes}</div>
      </div>
    </div>

    <button class="main-btn btn-accent" onclick="startGame()">开始调查</button>
    <div style="text-align:center;color:var(--text2);font-size:0.72rem;">响应式设计 · 手机 & 桌面均可游玩</div>
  `);
}

function selectMode(m){
  selectedMode=m;
  document.getElementById("modeNormal").classList.toggle("active",m==="normal");
  document.getElementById("modeChallenge").classList.toggle("active",m==="challenge");
}

// ---- 游戏 ----
function startGame(){
  engine.reset(selectedMode);locked=false;
  renderGameUI();loadQuestion();
}
function renderGameUI(){
  render(`
    <div class="topbar">
      <span class="level">第 1 题</span>
      <span class="phase">${engine.phaseDesc}</span>
      <span class="mode-badge ${engine.mode}">${engine.mode==="normal"?"普通":"挑战"}</span>
      <span class="score">得分: 0</span>
    </div>
    <div class="card-area" id="options"></div>
    <div class="timer-section">
      <div class="timer-header">
        <span class="timer-text" id="timerText">10.0 秒</span>
        <span class="timer-type" id="timerType"></span>
      </div>
      <div class="timer-bar-wrap"><div class="timer-bar-fill" id="timerBar" style="width:100%;background:var(--green);"></div></div>
    </div>
  `);
}
function loadQuestion(){
  if(locked)return;
  const q=engine.nextQuestion();timeLimit=q.timeLimit;timeLeft=q.timeLimit;
  document.querySelector(".level").textContent=`第 ${engine.level+1} 题`;
  document.querySelector(".score").textContent=`得分: ${engine.score}`;
  document.querySelector(".phase").textContent=engine.phaseDesc;
  document.getElementById("timerType").textContent=qTypeLabel(q.qType);

  const optsDiv=document.getElementById("options");
  const cols=q.numOpts===4?2:1;
  let html="";
  for(let i=0;i<q.statements.length;i++){
    html+=`<div class="option-btn" onclick="onAnswer(${i})" id="opt${i}"><span class="label">${LABELS[i]}</span><span>${q.statements[i]}</span></div>`;
  }
  optsDiv.innerHTML=html;
  optsDiv.style.display=cols===2?"grid":"flex";
  if(cols===2)optsDiv.style.gridTemplateColumns="1fr 1fr";else optsDiv.style.flexDirection="column";

  clearInterval(timerInterval);updateTimerDisplay();timerInterval=setInterval(tick,50);
}
function tick(){
  timeLeft-=0.05;
  if(timeLeft<=0){timeLeft=0;clearInterval(timerInterval);updateTimerDisplay();onTimeout();return;}
  updateTimerDisplay();
}
function updateTimerDisplay(){
  const ratio=timeLeft/timeLimit;
  const bar=document.getElementById("timerBar"),txt=document.getElementById("timerText");
  if(!bar||!txt)return;
  bar.style.width=(ratio*100)+"%";txt.textContent=timeLeft.toFixed(1)+" 秒";
  if(ratio<=0.25){bar.style.background="var(--red)";txt.style.color="var(--red)";}
  else if(ratio<=0.5){bar.style.background="var(--yellow)";txt.style.color="var(--yellow)";}
  else{bar.style.background="var(--green)";txt.style.color="var(--text)";}
}
function onAnswer(index){
  if(locked)return;locked=true;clearInterval(timerInterval);
  const result=engine.answer(index);
  document.querySelectorAll(".option-btn").forEach((el,i)=>{el.style.pointerEvents="none";if(i===result.falseIdx)el.classList.add("correct");else if(i===index&&!result.correct)el.classList.add("wrong");});
  if(result.correct){document.querySelector(".score").textContent=`得分: ${result.score}`;setTimeout(()=>{locked=false;loadQuestion();},600);}
  else setTimeout(()=>showGameOver("选错了证人！"),1200);
}
function onTimeout(){
  if(locked)return;locked=true;
  const result=engine.timeout();
  document.querySelectorAll(".option-btn").forEach((el,i)=>{el.style.pointerEvents="none";if(i===result.falseIdx)el.classList.add("correct");});
  setTimeout(()=>showGameOver("时间耗尽！"),1200);
}

// ---- 结算 ----
function showGameOver(reason){
  clearInterval(timerInterval);
  const level=engine.level+1,phaseText=engine.phase;
  const modeLabel=engine.mode==="normal"?"普通模式":"挑战模式";
  render(`
    <div class="badge">案件归档</div>
    <div class="over-block">
      <h2>调查结束</h2><p class="reason">${reason}</p>
      <div class="final-score">${engine.score}</div>
      <p class="final-label">案件解决得分</p>
      <p class="detail">${modeLabel} · ${phaseText} · 共调查 ${level} 名目击者</p>
    </div>
    <div class="btn-group">
      <button class="main-btn btn-accent" onclick="startGame()">重新调查</button>
      <button class="main-btn btn-dark" onclick="showStart()">返回档案室</button>
    </div>
  `);
}

// ---- 初始化 ----
(function init(){
  try{const saved=localStorage.getItem("whoslying-theme");if(saved&&THEMES.includes(saved))setTheme(saved);}catch(e){}
  showStart();
})();
</script>
</body>
</html>
